# This workflow will build a golang project and run tests
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Test

on:
  # Pull Request が作成・更新された時
  pull_request:
    branches: [main, "feat/*", "fix/*"]
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test.yml"

  # main ブランチに直接 push された時（PRを経由しない場合）
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libheif-dev libde265-dev libx265-dev pkg-config

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        timeout-minutes: 20
        run: |
          brew update
          brew install libheif

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install msys2 -y
          refreshenv
          C:\tools\msys64\usr\bin\bash -lc "pacman -S --noconfirm mingw-w64-x86_64-gcc"

      - name: Install Go module dependencies
        run: go mod download

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: go build -v -o bin/convert ./cmd/convert

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $env:PATH = "C:\tools\msys64\mingw64\bin;C:\tools\msys64\usr\bin;$env:PATH"
          go build -v -o bin/convert.exe ./cmd/convert

      - name: Run tests (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: go test -v ./...

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $env:PATH = "C:\tools\msys64\mingw64\bin;C:\tools\msys64\usr\bin;$env:PATH"
          go test -v ./...
